# Auto-deploy to Cloudflare Workers on push to master.
# Build step generates 9 HTML files (main + 8 per-segment) from src/template.html
# + src/segments.json via scripts/build.py before wrangler deploys.
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install --quiet beautifulsoup4 playwright

      - name: Install Chromium for headless paint + currency-toggle checks
        # verify.py spins up a local HTTP server and runs Playwright/Chromium against
        # the generated pages to assert hero emphasis renders, calculator step numbers
        # are sequential, and the USD/GEL currency toggle propagates to every visible
        # price string. Chromium is the only required engine.
        run: python3 -m playwright install --with-deps chromium

      - name: Build per-segment pages
        run: python3 scripts/build.py

      - name: Verify segment pages against checklist
        # Halts the deploy if any segment page regresses against the v4 spec
        # (cross-segment leak, missing objection block, currency toggle, etc.).
        # 30-check matrix; see docs/AUDIT-V4.md.
        run: python3 scripts/verify.py

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
