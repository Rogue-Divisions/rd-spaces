name = "rd-spaces"
compatibility_date = "2025-01-01"

# Custom Domain — Cloudflare auto-manages the DNS record.
# Must be top-level, NOT inside [assets].
routes = [
  { pattern = "spaces.roguedivisions.com", custom_domain = true }
]

[assets]
directory = "./public"
not_found_handling = "404-page"
html_handling = "drop-trailing-slash"
